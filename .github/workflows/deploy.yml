# WM-01: GitHub Actions CI/CD Pipeline.
#
# PIPELINE STAGES:
#   1. test   — Spin up a real Postgres 16 container and run Jest.
#               The deploy job is blocked until all tests pass.
#   2. deploy — SSH into the VPS, pull code, build, and reload PM2.
#
# GITHUB SECRETS REQUIRED (Settings > Secrets and variables > Actions):
#   VPS_HOST    — Your VPS public IP address
#   VPS_USER    — Your server username (e.g. ubuntu)
#   VPS_SSH_KEY — Contents of ~/.ssh/id_ed25519 (private key, not .pub)

name: CI / CD — Schema Documenter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Job 1: Run Tests ───────────────────────────────────────────────────────────
jobs:
  test:
    name: "WM-04 — Run Jest Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       schema_documenter_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "📦 Install dependencies"
        run: npm ci

      - name: "🧪 Run Jest test suite"
        run: npm test -- --ci --forceExit
        env:
          TEST_DB_HOST:     localhost
          TEST_DB_PORT:     5432
          TEST_DB_NAME:     schema_documenter_test
          TEST_DB_USER:     postgres
          TEST_DB_PASSWORD: postgres
          JWT_SECRET:       test-secret-do-not-use-in-production

# ── Job 2: Deploy to VPS ──────────────────────────────────────────────────────
  deploy:
    name: "Deploy to Production VPS"
    runs-on: ubuntu-latest
    needs: test   # ← Only runs after tests pass

    # Only deploy on push to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🚀 Deploy via SSH"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e   # Exit immediately on any error

            # Load NVM (installed as part of server setup)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "📂 Navigating to project directory..."
            cd /var/www/schema-documenter

            echo "⬇ Pulling latest code from main..."
            git pull origin main

            echo "📦 Installing production dependencies..."
            npm ci --omit=dev

            echo "🔨 Building Next.js application..."
            NODE_ENV=production npm run build

            echo "♻ Reloading PM2 (zero-downtime)..."
            pm2 reload ecosystem.config.js --env production

            echo "✅ Deployment complete!"
            pm2 list
