# WM-01: Production Nginx configuration for Schema Documenter.
#
# HOW TO DEPLOY:
#   sudo cp nginx/schema-documenter.conf /etc/nginx/sites-available/schema-documenter
#   sudo ln -s /etc/nginx/sites-available/schema-documenter /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d yourdomain.com   # Certbot fills in SSL paths

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Certbot will add its ACME challenge location here automatically
    return 301 https://$host$request_uri;
}

# ── HTTPS Server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL (Certbot fills these in) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin" always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml;

    # ── Main Proxy — forward all traffic to Next.js ───────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (Next.js hot reload in dev)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';

        # Pass real client info to the app
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Cache Next.js static assets aggressively ──────────────────────────────
    # Next.js content-hashes these files, so 1-year cache is safe
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/schema-documenter-access.log;
    error_log  /var/log/nginx/schema-documenter-error.log;
}
